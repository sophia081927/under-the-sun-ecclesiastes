<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyond the Vapor · The Full Visual Summary</title>
<meta name="description" content="The complete visual summary of the Ecclesiastes 12 sermon — Beyond the Vapor.">
<style>
  :root{
    --bg:#14161a; --bg2:#1b1e24; --ink:#ece7dd; --muted:#9a948a; --faint:#6f6a62;
    --sun:#d9a441; --sun-soft:#e8c77e; --line:rgba(217,164,65,.22); --line-soft:rgba(236,231,221,.10);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:Georgia,"Songti SC",serif;line-height:1.8}
  a{color:var(--sun-soft);text-decoration:none}
  a:hover{color:var(--sun)}
  .topbar{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;
    padding:14px 24px;font-size:13px;letter-spacing:.16em;background:rgba(20,22,26,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line-soft)}
  .topbar .mark{color:var(--sun-soft);letter-spacing:.2em}
  .topbar .links a{margin-left:18px;font-size:12px;color:var(--muted)}
  .topbar .links a:hover{color:var(--sun-soft)}
  header.hero{max-width:1000px;margin:0 auto;padding:80px 26px 30px;text-align:center}
  header.hero .kicker{color:var(--sun);font-size:12px;letter-spacing:.3em;text-transform:uppercase;margin-bottom:20px}
  header.hero h1{font-size:clamp(30px,5vw,48px);font-weight:600;line-height:1.25}
  header.hero p{color:var(--muted);margin-top:18px;font-size:17px}
  .deck{max-width:1000px;margin:0 auto;padding:30px 26px 80px}
  figure{margin:0 0 34px;position:relative}
  figure img{width:100%;display:block;border:1px solid var(--line);border-radius:8px}
  figure .num{position:absolute;top:12px;left:12px;background:rgba(20,22,26,.82);color:var(--sun-soft);
    font-size:12px;letter-spacing:.1em;padding:5px 12px;border-radius:30px;border:1px solid var(--line-soft)}
  footer{text-align:center;padding:50px 26px 70px;color:var(--faint);font-size:13px;line-height:1.9;border-top:1px solid var(--line-soft)}
  .backbtn{display:inline-block;margin-top:30px;border:1px solid var(--sun);color:var(--sun-soft);
    padding:12px 28px;border-radius:2px;font-size:15px}
  .backbtn:hover{background:rgba(217,164,65,.12)}
</style>
</head>
